version: "3.8"

services:
  minio:
    image: minio/minio:latest
    container_name: playground-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  app:
    build: .
    container_name: playground-app
    ports:
      - "8000:8000"
    environment:
      PLAYGROUND_S3_ENDPOINT_URL: "http://minio:9000"
      PLAYGROUND_S3_ACCESS_KEY: "minioadmin"
      PLAYGROUND_S3_SECRET_KEY: "minioadmin"
      PLAYGROUND_S3_REGION_NAME: "us-east-1"
    depends_on:
      minio:
        condition: service_healthy
    command: uvicorn playground:app --host 0.0.0.0 --port 8000
